<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, getDocs, collection, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC9rJ7WYoyQjYNDXQYgqCmqLUFrMb0Mubk",
  authDomain: "siel-record.firebaseapp.com",
  projectId: "siel-record",
  storageBucket: "siel-record.firebasestorage.app",
  messagingSenderId: "209424604400",
  appId: "1:209424604400:web:5cc979d6490eb8aada3635"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
// 2026-06-30 수정: 부모님용 앱이 날짜별 저장 구조(records 컬렉션)로 바뀌어서
// 이 선생님용(보기 전용) 페이지도 같은 컬렉션을 읽도록 변경.
const recordsCol = collection(db, "records");

function todayKey(){
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}

async function trackTodayVisit(){
  const badge = document.getElementById("todayVisitBadge");
  if(!badge) return;

  const key = todayKey();
  const visitRef = doc(db, "teacher_visits", key);
  const localKey = "siel_teacher_visited_" + key;

  try{
    // 같은 기기에서는 하루 1회만 방문수 증가
    if(localStorage.getItem(localKey) !== "1"){
      try{
        await updateDoc(visitRef, { count: increment(1) });
      }catch(e){
        await setDoc(visitRef, { count: 1 });
      }
      localStorage.setItem(localKey, "1");
    }

    const snap = await getDoc(visitRef);
    const count = snap.exists() ? (snap.data().count || 0) : 0;
    badge.textContent = "TODAY 방문 " + count;
  }catch(e){
    console.error(e);
    badge.textContent = "TODAY 방문 -";
  }
}


function normalizeDateKey(value){
  if(value && typeof value === "object"){
    if(typeof value.toDate === "function") value = value.toDate();
    if(value instanceof Date){
      const y=value.getFullYear();
      const m=String(value.getMonth()+1).padStart(2,"0");
      const d=String(value.getDate()).padStart(2,"0");
      return y+"-"+m+"-"+d;
    }
  }
  value = String(value || "").trim();
  if(!value) return "";
  const m = value.match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);
  if(m){
    return m[1] + "-" + String(m[2]).padStart(2,"0") + "-" + String(m[3]).padStart(2,"0");
  }
  return value.slice(0,10);
}

function getRecordKey(r){
  return normalizeDateKey((r && (r.key || r.date || r.recordDate)) || "");
}

function getKoreanWeekday(dateStr){
  const days = ["일","월","화","수","목","금","토"];
  const d = new Date(dateStr);
  return days[d.getDay()] || "";
}

function cleanAggression(value){
  return String(value || "").replace(/^\d+\s*/, "");
}

function levelDot(value){
  value = String(value || "");
  let cls = "dotNormal";
  if(value.includes("없음")) cls = "dotNone";
  else if(value.includes("좋음") || value.includes("안정적임")) cls = "dotGood";
  else if(value.includes("보통") || value.includes("약함") || value.includes("조절하려함") || value.includes("피곤함/졸림")) cls = "dotNormal";
  else if(value.includes("조금") || value.includes("중간") || value.includes("귀") || value.includes("허벅지") || value.includes("불안함") || value.includes("기다림") || value.includes("울음") || value.includes("텐트럼")) cls = "dotMild";
  else if(value.includes("나쁨") || value.includes("심함") || value.includes("멍") || value.includes("상처")) cls = "dotBad";
  return `<span class="colorDot ${cls}"></span>`;
}


function sanitizeMemoHtml(html){
  const box = document.createElement("div");
  box.innerHTML = String(html || "");

  const allowed = new Set(["B","STRONG","U","BR","DIV","SPAN","FONT"]);
  const walker = document.createTreeWalker(box, NodeFilter.SHOW_ELEMENT, null);
  const nodes = [];
  while(walker.nextNode()) nodes.push(walker.currentNode);

  nodes.forEach(el => {
    if(!allowed.has(el.tagName)){
      const text = document.createTextNode(el.textContent || "");
      el.replaceWith(text);
      return;
    }

    [...el.attributes].forEach(attr => {
      const name = attr.name.toLowerCase();
      const value = attr.value || "";

      if(el.tagName === "FONT" && name === "color"){
        if(value === "#d90000" || value === "#222222" || value === "#ABA7A8" || value === "red" || value === "black"){
          return;
        }
      }

      if(el.tagName === "SPAN" && name === "style"){
        const safe = [];
        if(/color\s*:\s*(#d90000|#222222|#ABA7A8|red|black)/i.test(value)){
          const m = value.match(/color\s*:\s*(#d90000|#222222|#ABA7A8|red|black)/i);
          safe.push("color:" + m[1]);
        }
        if(/text-decoration\s*:\s*underline/i.test(value)){
          safe.push("text-decoration:underline");
        }
        if(/font-weight\s*:\s*(bold|700)/i.test(value)){
          safe.push("font-weight:700");
        }
        if(safe.length){
          el.setAttribute("style", safe.join(";"));
          return;
        }
      }

      el.removeAttribute(attr.name);
    });
  });

  return box.innerHTML;
}


function sanitizeSimpleEditorHtml(html){
  const box = document.createElement("div");
  box.innerHTML = String(html || "");

  const allowedTags = new Set(["B","STRONG","U","BR","DIV","SPAN","FONT"]);

  function normalizeColor(value){
    value = String(value || "").trim().toLowerCase().replace(/\s+/g, "");
    if(value === "#d90000" || value === "red" || value === "rgb(217,0,0)") return "#d90000";
    if(value === "#222222" || value === "#222" || value === "black" || value === "rgb(34,34,34)") return "#222222";
    return "";
  }

  function cleanNode(node){
    [...node.children].forEach(child => cleanNode(child));
    if(node.nodeType !== 1) return;

    if(!allowedTags.has(node.tagName)){
      const span = document.createElement("span");
      span.textContent = node.textContent || "";
      node.replaceWith(span);
      return;
    }

    let color = "";
    if(node.tagName === "FONT"){
      color = normalizeColor(node.getAttribute("color"));
    }

    const style = node.getAttribute("style") || "";
    const colorMatch = style.match(/color\s*:\s*([^;]+)/i);
    if(colorMatch){
      color = normalizeColor(colorMatch[1]);
    }

    const hasUnderline = /text-decoration[^;]*underline/i.test(style);
    const hasBold = /font-weight\s*:\s*(bold|700|800|900)/i.test(style);

    [...node.attributes].forEach(attr => node.removeAttribute(attr.name));

    if(color) node.style.color = color;
    if(hasUnderline) node.style.textDecoration = "underline";
    if(hasBold) node.style.fontWeight = "700";
  }

  cleanNode(box);
  return box.innerHTML;
}

window.toggleChatDoctor = function(btn){
  const box = btn.nextElementSibling;
  if(!box) return;
  box.classList.toggle("open");
  btn.textContent = box.classList.contains("open") ? "💬 CHAT DOCTOR 닫기" : "💬 CHAT DOCTOR 보기";
}


function normalizeMedicineList(list){
  return (list || []).map(v => v === "기타영양제" || v === "기타 영양제" ? "보울라디" : v);
}

function escapeHtml(text){
  return String(text || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

let recordDisplayCount = 10;

async function loadRecords(resetCount=true){
  const box=document.getElementById("records");
  if(resetCount) recordDisplayCount = 10;

  try{
    const snap = await getDocs(recordsCol);
    const records = [];
    snap.forEach(d => records.push(d.data()));

    if(records.length===0){
      box.className = "loading";
      box.innerHTML = "아직 저장된 기록이 없습니다.";
      return;
    }

    records.sort((a,b)=>getRecordKey(b).localeCompare(getRecordKey(a)));
    const visibleRecords = records.slice(0, recordDisplayCount);

    box.className = "";
    box.innerHTML=visibleRecords.map((r)=>{
      const k=getRecordKey(r);
      const memo = typeof sanitizeMemoHtml === "function" ? sanitizeMemoHtml(r.memo || "-") : (r.memo || "-");
      const growthMemo = escapeHtml(r.growthMemo || "");
      return `
        <div class="record">
          <div class="recordDate">📅 ${k} (${getKoreanWeekday(k)})</div>
          <b>🌙 수면:</b> ${levelDot(r.sleep)}${escapeHtml(r.sleep || "-")} &nbsp;&nbsp; <b>🕒 총수면:</b> ${escapeHtml(r.sleepTotal || "-")}<br>
          <b>👦 공격성:</b> ${levelDot(r.aggression)}${escapeHtml(cleanAggression(r.aggression))} &nbsp;&nbsp; <b>😣 자해:</b> ${levelDot(r.selfharm)}${escapeHtml(r.selfharm || "-")} &nbsp;&nbsp; <b>🍚 식사량:</b> ${escapeHtml(r.mealAmount || "-")}<br>
          <b>🌿 컨디션:</b> ${escapeHtml((r.condition || []).join(", ") || "-")}<br>
          <b>💊 복용약:</b> ${escapeHtml(normalizeMedicineList(r.medicine || []).join(", ") || "-")}<br>
          <div class="recordMemo">${memo}</div>
          ${growthMemo ? `<div class="recordGrowthMemo">🌳 성장 메모: ${growthMemo}</div>` : ""}
          ${r.chatDoctorMemo ? `<button type="button" class="chatDoctorToggle" onclick="event.stopPropagation(); toggleChatDoctor(this);">💬 CHAT DOCTOR 보기</button><div class="chatDoctorContent">${sanitizeSimpleEditorHtml(r.chatDoctorMemo)}</div>` : ""}
        </div>`;
    }).join("");

    if(records.length > recordDisplayCount){
      box.innerHTML += `
      <div class="recordCountInfo">최근 ${recordDisplayCount}개 / 전체 ${records.length}개 기록 표시 중</div>
      <div class="recordActionRow">
        <button type="button" class="recordActionBtn" onclick="event.stopPropagation(); loadMoreRecords();">＋ 기록 더보기</button>
        <button type="button" class="recordActionBtn" onclick="event.stopPropagation(); scrollToTopArea();">↑ 맨위로</button>
      </div>`;
    }else{
      box.innerHTML += `
      <div class="recordCountInfo">전체 ${records.length}개 기록 표시 중</div>
      <div class="recordActionRow">
        <button type="button" class="recordActionBtn" onclick="event.stopPropagation(); scrollToTopArea();">↑ 맨위로</button>
      </div>`;
    }

  }catch(e){
    console.error(e);
    box.className = "loading";
    box.innerHTML = "기록을 불러오지 못했습니다. Firebase 연결 상태를 확인해주세요.";
  }
}

window.loadMoreRecords = function(){
  recordDisplayCount += 10;
  loadRecords(false);
}

window.scrollToTopArea = function(){
  const topTarget = document.querySelector("h1") || document.body;
  topTarget.scrollIntoView({behavior:"smooth", block:"start"});
}

loadRecords();
trackTodayVisit();
</script>
